<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">MTG App</title>
    <style>
        body {
            font-family: Georgia, "Times New Roman", serif;
            margin: 2rem;
            line-height: 1.5;
        }

        .topbar {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.7rem;
            border-bottom: 1px solid #d5d5d5;
        }

        .topbar a {
            text-decoration: none;
            color: #1b1b1b;
            border: 1px solid transparent;
            padding: 0.35rem 0.6rem;
        }

        .topbar a.active {
            background: #f1ebde;
            border-color: #2c2c2c;
        }

        .actions {
            margin: 1rem 0;
        }

        .lookup-form {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin: 1rem 0;
        }

        .lookup-input {
            min-width: 280px;
            padding: 0.45rem 0.55rem;
            border: 1px solid #2c2c2c;
            background: #fffdf7;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 0.8rem;
            border: 1px solid #2c2c2c;
            background: #f1ebde;
            color: #111;
            text-decoration: none;
        }

        pre {
            border: 1px solid #d0d0d0;
            background: #faf8f2;
            padding: 0.8rem;
            overflow-x: auto;
            max-width: 960px;
        }
    </style>
</head>
<body>
<nav class="topbar" aria-label="Main navigation">
    <a href="/" th:classappend="${currentPage == 'home'} ? ' active' : ''">Home</a>
    <a href="/allcards" th:classappend="${currentPage == 'allcards'} ? ' active' : ''">All Cards</a>
</nav>

<h1 th:text="${title}">MTG App</h1>
<p th:text="${message}">Thymeleaf is configured and running.</p>

<div class="actions">
    <a class="btn" href="/">Get random card</a>
</div>

<form class="lookup-form" aria-label="Find card by id or name" method="get" action="/allcards">
    <label for="cardRef">Card id or name</label>
    <input id="cardRef" class="lookup-input" name="cardRef" type="text" placeholder="Black Lotus" th:value="${cardRef}" required>
    <button class="btn" type="submit">Search</button>
</form>

<pre th:text="${randomCardJson}">No random card loaded.</pre>
</body>
</html>
